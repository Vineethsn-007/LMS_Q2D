services:
  # 1. FastAPI Backend Service
  - type: web
    name: skillforge-backend
    env: python
    root: backend
    plan: free
    buildCommand: pip install -r requirements.txt || pip install -r backend/requirements.txt
    startCommand: cd backend 2>/dev/null || true && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: skillforge-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: RAZORPAY_KEY_ID
        value: rzp_test_TDQGFCm2xKMtfk
      - key: RAZORPAY_KEY_SECRET
        value: RzXrymAZJUiGKAoDtZsFMV1G

  # 2. React Static Frontend Service
  - type: web
    name: skillforge-frontend
    env: static
    root: frontend
    buildCommand: |
      if [ -n "$REACT_APP_API_URL" ] && [[ "$REACT_APP_API_URL" != http* ]]; then
        export REACT_APP_API_URL="https://$REACT_APP_API_URL"
      fi
      cd frontend 2>/dev/null || true
      npm install && npm run build
    staticPublishPath: ./build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: skillforge-backend
          property: host

databases:
  # 3. PostgreSQL Database
  - name: skillforge-db
    plan: free
